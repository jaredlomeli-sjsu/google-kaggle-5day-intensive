<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Technologies — IT Helpdesk Supervisor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0e1a, #0d1b2a, #0a1628);
      color: #e0e0e0;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header .company {
      font-size: 0.75rem;
      color: #0bc5ea;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 0.4rem;
    }

    header h1 { font-size: 2rem; font-weight: 700; color: #ffffff; }
    header p  { margin-top: 0.4rem; color: #718096; font-size: 0.9rem; }

    /* ---- Submission Form ---- */
    .submit-section {
      max-width: 700px;
      margin: 0 auto 2.5rem;
    }

    .submit-section h2 {
      font-size: 0.8rem;
      color: #0bc5ea;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .glass-form {
      background: rgba(11, 197, 234, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(11, 197, 234, 0.15);
      border-radius: 16px;
      padding: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group.full-width { grid-column: 1 / -1; }

    label {
      font-size: 0.72rem;
      color: #4a6fa5;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input, select, textarea {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(11, 197, 234, 0.18);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #0bc5ea;
    }

    select option { background: #0d1b2a; }

    textarea { resize: vertical; min-height: 68px; }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #0bc5ea, #0077b6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-submit:hover   { opacity: 0.9; }
    .btn-submit:active  { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .submit-result {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }

    .result-resolved { background: rgba(72,187,120,0.12); color: #68d391; border: 1px solid #38a169; }
    .result-pending  { background: rgba(11,197,234,0.12);  color: #0bc5ea; border: 1px solid #0077b6; }
    .result-error    { background: rgba(252,72,72,0.12);   color: #fc8181; border: 1px solid #c53030; }

    /* ---- Divider ---- */
    .divider {
      max-width: 1200px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: #2d4a6e;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(11, 197, 234, 0.12);
    }

    /* ---- Cards ---- */
    #cards-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: rgba(11, 197, 234, 0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(11, 197, 234, 0.14);
      border-radius: 16px;
      padding: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .reporter { font-size: 0.78rem; color: #0bc5ea; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
    .ticket-id { font-size: 1.1rem; font-weight: 700; color: #fff; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge-LOW    { background: rgba(72,187,120,0.18); color: #68d391; border: 1px solid #38a169; }
    .badge-MEDIUM { background: rgba(11,197,234,0.18); color: #0bc5ea; border: 1px solid #0077b6; }
    .badge-HIGH   { background: rgba(252,72,72,0.18);  color: #fc8181; border: 1px solid #c53030; }

    .detail-row { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.875rem; }
    .detail-label { color: #4a6fa5; min-width: 100px; flex-shrink: 0; }
    .detail-value { color: #cbd5e0; }

    .ai-box {
      background: rgba(0, 0, 0, 0.3);
      border-left: 3px solid #0bc5ea;
      border-radius: 0 8px 8px 0;
      padding: 0.75rem;
      margin: 1rem 0;
      font-size: 0.78rem;
      color: #a0aec0;
      line-height: 1.55;
      max-height: 130px;
      overflow-y: auto;
    }

    .ai-box strong { color: #0bc5ea; }

    .actions { display: flex; gap: 0.75rem; margin-top: 1rem; }

    .btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.85; transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-escalate { background: linear-gradient(135deg, #0077b6, #0bc5ea); color: #fff; }
    .btn-close    { background: linear-gradient(135deg, #c53030, #e53e3e); color: #fff; }

    .card-result {
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }

    .card-result-escalated { background: rgba(11,197,234,0.12); color: #0bc5ea; }
    .card-result-closed    { background: rgba(72,187,120,0.12); color: #68d391; }

    #empty-state {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
      color: #2d4a6e;
      max-width: 1200px;
      margin: 0 auto;
    }

    #empty-state h2 { font-size: 1.1rem; color: #4a6fa5; margin-bottom: 0.4rem; }
    #empty-state p  { font-size: 0.85rem; }
  </style>
</head>
<body>

  <header>
    <div class="company">Nexus Technologies &mdash; IT Department</div>
    <h1>Helpdesk Supervisor Dashboard</h1>
    <p>Submit a ticket or review incidents pending supervisor action below</p>
  </header>

  <!-- Submission Form -->
  <div class="submit-section">
    <h2>Submit Support Ticket</h2>
    <div class="glass-form">
      <div class="form-grid">

        <div class="form-group">
          <label>Reporter Email</label>
          <input type="email" id="reporter" placeholder="employee@nexus.com" />
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Network">Network</option>
            <option value="Security">Security</option>
            <option value="Account/Access">Account / Access</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label>Affected System</label>
          <input type="text" id="affected_system" placeholder="e.g. Corporate ERP, Outlook, Workstation #42" />
        </div>

        <div class="form-group full-width">
          <label>Description</label>
          <textarea id="description" placeholder="Describe the issue in detail..."></textarea>
        </div>

      </div>

      <button class="btn-submit" onclick="submitTicket()">Submit Ticket</button>
      <div class="submit-result" id="submit-result"></div>
    </div>
  </div>

  <div class="divider">Open Tickets &mdash; Pending Supervisor Action</div>

  <div id="empty-state">
    <h2>No open tickets</h2>
    <p>Routine tickets are auto-resolved. Complex incidents appear here for your review.</p>
  </div>

  <div id="cards-container"></div>

  <script>
    async function submitTicket() {
      const btn    = document.querySelector('.btn-submit');
      const result = document.getElementById('submit-result');

      const reporter        = document.getElementById('reporter').value.trim();
      const category        = document.getElementById('category').value;
      const affected_system = document.getElementById('affected_system').value.trim();
      const description     = document.getElementById('description').value.trim();

      if (!reporter || !affected_system || !description) {
        showSubmitResult('error', 'Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Processing...';
      result.style.display = 'none';

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reporter, category, affected_system, description }),
        });

        const data = await res.json();

        if (!res.ok) {
          showSubmitResult('error', data.detail || 'Submission failed.');
          return;
        }

        if (data.status === 'auto_resolved') {
          showSubmitResult('resolved', `Auto-processed: ${data.message}`);
          clearForm();
        } else if (data.status === 'pending_review') {
          showSubmitResult('pending', `Needs review: ticket card added to the dashboard below.`);
          clearForm();
          await loadPending();
        }

      } catch (err) {
        showSubmitResult('error', `Error: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Ticket';
      }
    }

    function showSubmitResult(type, message) {
      const el = document.getElementById('submit-result');
      el.className = `submit-result result-${type}`;
      el.textContent = message;
      el.style.display = 'block';
    }

    function clearForm() {
      document.getElementById('reporter').value        = '';
      document.getElementById('affected_system').value = '';
      document.getElementById('description').value     = '';
    }

    async function loadPending() {
      const container = document.getElementById('cards-container');
      const empty     = document.getElementById('empty-state');

      try {
        const res  = await fetch('/api/pending');
        const data = await res.json();

        container.innerHTML = '';

        if (!Array.isArray(data) || data.length === 0) {
          empty.style.display = 'block';
          return;
        }

        empty.style.display = 'none';
        data.forEach(item => container.appendChild(buildCard(item)));

      } catch (err) {
        container.innerHTML = `<p style="color:#fc8181;text-align:center">Failed to load tickets: ${err.message}</p>`;
      }
    }

    function buildCard(item) {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${item.session_id}`;

      const risk = item.risk_level || 'MEDIUM';

      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="reporter">${item.reporter || 'Unknown'}</div>
            <div class="ticket-id">${item.session_id} &mdash; ${item.category || 'General'}</div>
          </div>
          <span class="badge badge-${risk}">${risk} severity</span>
        </div>

        <div class="detail-row">
          <span class="detail-label">Affected System</span>
          <span class="detail-value">${item.affected_system || '&mdash;'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Description</span>
          <span class="detail-value">${item.description || '&mdash;'}</span>
        </div>

        <div class="ai-box">
          <strong>AI Incident Analysis:</strong><br/>
          ${item.ai_recommendation || 'No AI analysis available — review manually.'}
        </div>

        <div class="actions">
          <button class="btn btn-escalate" onclick="submitAction('${item.session_id}', 'escalate', this)">Escalate</button>
          <button class="btn btn-close"    onclick="submitAction('${item.session_id}', 'close', this)">Close Ticket</button>
        </div>

        <div class="card-result" id="result-${item.session_id}"></div>
      `;

      return card;
    }

    async function submitAction(sessionId, action, btn) {
      const card    = document.getElementById(`card-${sessionId}`);
      const result  = document.getElementById(`result-${sessionId}`);
      const buttons = card.querySelectorAll('.btn');

      buttons.forEach(b => b.disabled = true);

      try {
        const res  = await fetch('/api/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, action, reviewer: 'supervisor' }),
        });
        const data = await res.json();

        result.style.display = 'block';
        result.className = `card-result card-result-${action}d`;
        result.textContent = action === 'escalate' ? 'Escalated to Tier 2/3' : 'Ticket Closed';

        setTimeout(() => {
          card.style.transition = 'opacity 0.5s';
          card.style.opacity = '0';
          setTimeout(() => { card.remove(); checkEmpty(); }, 500);
        }, 1500);

      } catch (err) {
        result.style.display = 'block';
        result.className = 'card-result card-result-closed';
        result.textContent = `Error: ${err.message}`;
        buttons.forEach(b => b.disabled = false);
      }
    }

    function checkEmpty() {
      const container = document.getElementById('cards-container');
      const empty     = document.getElementById('empty-state');
      if (container.children.length === 0) {
        empty.style.display = 'block';
      }
    }

    // Load any pending tickets on page open
    loadPending();
  </script>
</body>
</html>
