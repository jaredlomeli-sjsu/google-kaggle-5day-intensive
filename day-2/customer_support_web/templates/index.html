<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shipping Support Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
      color: #1a1a2e;
      margin-bottom: 16px;
      text-align: center;
    }

    #chat-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      height: 560px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .user {
      align-self: flex-end;
      background: #0066ff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .agent {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .thinking {
      align-self: flex-start;
      color: #888;
      font-style: italic;
      font-size: 0.85rem;
      padding: 6px 14px;
    }

    #input-area {
      display: flex;
      padding: 14px;
      border-top: 1px solid #eee;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
    }

    #user-input:focus {
      border-color: #0066ff;
    }

    #send-btn {
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    #send-btn:hover { background: #0052cc; }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Shipping Customer Support Agent</h1>
  <div id="chat-container">
    <div id="messages">
      <div class="message agent">
        Hi! I'm your shipping support assistant. Ask me about rates, tracking, delivery, or returns.
      </div>
    </div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="Ask a shipping question..." autocomplete="off"/>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }

    function addThinking() {
      const div = document.createElement("div");
      div.classList.add("thinking");
      div.textContent = "Agent is thinking...";
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      btn.disabled = true;
      addMessage(text, "user");
      const thinking = addThinking();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        thinking.remove();
        if (data.response) {
          addMessage(data.response, "agent");
        } else {
          addMessage("Error: " + (data.error || "Unknown error"), "agent");
        }
      } catch (err) {
        thinking.remove();
        addMessage("Could not reach the server.", "agent");
      }

      btn.disabled = false;
      input.focus();
    }

    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
